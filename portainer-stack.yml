version: '3.8'

services:
  wakeonlan:
    image: ghcr.io/zx1234r/wakeonlan:latest
    container_name: wakeonlan-dashboard
    network_mode: host
    volumes:
      - wakeonlan_data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  wakeonlan_data:
    driver: local
