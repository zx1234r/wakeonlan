version: '3.8'

services:
  wakeonlan:
    image: wakeonlan-dashboard:latest
    container_name: wakeonlan-dashboard
    ports:
      - "5000:5000"
    volumes:
      - wakeonlan_data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - wakeonlan_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wakeonlan.rule=Host(`wakeonlan.yourdomain.com`)"
      - "traefik.http.services.wakeonlan.loadbalancer.server.port=5000"
      - "traefik.docker.network=wakeonlan_network"

volumes:
  wakeonlan_data:
    driver: local

networks:
  wakeonlan_network:
    driver: bridge
