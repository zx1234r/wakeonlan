<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake-on-LAN Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .device-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid #e1e5e9;
        }

        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .device-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .device-mac {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #666;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .device-info {
            margin: 15px 0;
        }

        .device-info p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #666;
        }

        .device-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e1e5e9;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            border-left: 4px solid #28a745;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: #dc3545;
        }

        .global-actions {
            text-align: center;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .devices-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-broadcast-tower"></i> Wake-on-LAN Dashboard</h1>
            <p>Remotely wake up your network devices with ease</p>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2><i class="fas fa-plus-circle"></i> Add New Device</h2>
                <form id="deviceForm">
                    <div class="form-group">
                        <label for="deviceName">Device Name *</label>
                        <input type="text" id="deviceName" name="name" placeholder="My Computer" required>
                    </div>
                    <div class="form-group">
                        <label for="deviceMac">MAC Address *</label>
                        <input type="text" id="deviceMac" name="mac" placeholder="XX:XX:XX:XX:XX:XX" required pattern="^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$">
                    </div>
                    <div class="form-group">
                        <label for="deviceIp">IP Address</label>
                        <input type="text" id="deviceIp" name="ip" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label for="deviceDescription">Description</label>
                        <textarea id="deviceDescription" name="description" placeholder="Gaming PC in living room" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn">
                        <i class="fas fa-plus"></i> Add Device
                    </button>
                </form>
            </div>

            <div class="card">
                <h2><i class="fas fa-chart-bar"></i> Dashboard Stats</h2>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="totalDevices">0</div>
                        <div class="stat-label">Total Devices</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalWakes">0</div>
                        <div class="stat-label">Total Wakes</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="lastWake">Never</div>
                        <div class="stat-label">Last Wake</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="global-actions">
            <button class="btn btn-success" onclick="wakeAllDevices()">
                <i class="fas fa-power-off"></i> Wake All Devices
            </button>
        </div>

        <div class="card">
            <h2><i class="fas fa-desktop"></i> Your Devices</h2>
            <div id="devicesContainer">
                <div class="empty-state">
                    <i class="fas fa-desktop"></i>
                    <h3>No devices added yet</h3>
                    <p>Add your first device using the form above</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <div id="toastMessage"></div>
    </div>

    <script>
        let devices = [];

        // Load devices on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDevices();
        });

        // Add device form submission
        document.getElementById('deviceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            addDevice();
        });

        async function loadDevices() {
            try {
                const response = await fetch('/api/devices');
                devices = await response.json();
                renderDevices();
                updateStats();
            } catch (error) {
                showToast('Error loading devices', 'error');
            }
        }

        async function addDevice() {
            const formData = new FormData(document.getElementById('deviceForm'));
            const deviceData = Object.fromEntries(formData);

            try {
                const response = await fetch('/api/devices', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(deviceData)
                });

                const result = await response.json();
                
                if (result.success) {
                    showToast('Device added successfully!');
                    document.getElementById('deviceForm').reset();
                    loadDevices();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('Error adding device', 'error');
            }
        }

        async function deleteDevice(deviceId) {
            if (!confirm('Are you sure you want to delete this device?')) {
                return;
            }

            try {
                const response = await fetch(`/api/devices/${deviceId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('Device deleted successfully!');
                    loadDevices();
                } else {
                    showToast('Error deleting device', 'error');
                }
            } catch (error) {
                showToast('Error deleting device', 'error');
            }
        }

        async function wakeDevice(deviceId) {
            try {
                const response = await fetch(`/api/wake/${deviceId}`, {
                    method: 'POST'
                });

                const result = await response.json();
                
                if (result.success) {
                    showToast(`Wake-on-LAN packet sent to ${result.device.name}!`);
                    loadDevices(); // Refresh to show updated stats
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('Error sending wake packet', 'error');
            }
        }

        async function wakeAllDevices() {
            if (devices.length === 0) {
                showToast('No devices to wake', 'error');
                return;
            }

            try {
                const response = await fetch('/api/wake-all', {
                    method: 'POST'
                });

                const result = await response.json();
                
                if (result.success) {
                    const successCount = result.results.filter(r => r.success).length;
                    showToast(`Wake packets sent to ${successCount} device(s)!`);
                    loadDevices(); // Refresh to show updated stats
                } else {
                    showToast('Error waking devices', 'error');
                }
            } catch (error) {
                showToast('Error waking devices', 'error');
            }
        }

        function renderDevices() {
            const container = document.getElementById('devicesContainer');
            
            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-desktop"></i>
                        <h3>No devices added yet</h3>
                        <p>Add your first device using the form above</p>
                    </div>
                `;
                return;
            }

            const devicesHTML = devices.map(device => `
                <div class="device-card">
                    <div class="device-header">
                        <div>
                            <div class="device-name">${device.name}</div>
                            <div class="device-mac">${device.mac}</div>
                        </div>
                    </div>
                    <div class="device-info">
                        ${device.ip ? `<p><i class="fas fa-network-wired"></i> IP: ${device.ip}</p>` : ''}
                        ${device.description ? `<p><i class="fas fa-info-circle"></i> ${device.description}</p>` : ''}
                    </div>
                    <div class="device-actions">
                        <button class="btn btn-success btn-small" onclick="wakeDevice(${device.id})">
                            <i class="fas fa-power-off"></i> Wake Up
                        </button>
                        <button class="btn btn-danger btn-small" onclick="deleteDevice(${device.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value">${device.wake_count || 0}</div>
                            <div class="stat-label">Wake Count</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${device.last_woken ? new Date(device.last_woken).toLocaleDateString() : 'Never'}</div>
                            <div class="stat-label">Last Woken</div>
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="devices-grid">${devicesHTML}</div>`;
        }

        function updateStats() {
            document.getElementById('totalDevices').textContent = devices.length;
            
            const totalWakes = devices.reduce((sum, device) => sum + (device.wake_count || 0), 0);
            document.getElementById('totalWakes').textContent = totalWakes;
            
            const lastWakeDevice = devices
                .filter(d => d.last_woken)
                .sort((a, b) => new Date(b.last_woken) - new Date(a.last_woken))[0];
            
            document.getElementById('lastWake').textContent = lastWakeDevice 
                ? new Date(lastWakeDevice.last_woken).toLocaleString()
                : 'Never';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
